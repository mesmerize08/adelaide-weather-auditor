name: Adelaide Weather Accuracy Auditor

on:
  schedule:
    # Adelaide is UTC+10:30 (ACDT, Oct–Apr) or UTC+9:30 (ACST, Apr–Oct).
    # 22:30 UTC = 09:00 ACDT  (summer)
    # 23:30 UTC = 09:00 ACST  (winter)
    # Both run every day. weather_fetcher.py uses deduplication, so only
    # whichever run lands closest to 9 AM Adelaide time will produce new data.
    - cron: '30 22 * * *'
    - cron: '30 23 * * *'
  workflow_dispatch: {}   # Manual trigger (useful for testing / first run)

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────
  # Job 1: Fetch weather data and commit to repo
  # ─────────────────────────────────────────────────────────
  fetch_and_commit:
    name: Fetch & Commit Weather Data
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 pandas pytz

      - name: Run weather fetcher
        run: python weather_fetcher.py

      - name: Commit and push updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: automated weather data update"
          file_pattern: weather_history.csv

  # ─────────────────────────────────────────────────────────
  # Job 2: Ping the Streamlit app to prevent it sleeping
  # Streamlit Community Cloud sleeps apps after 7 days of
  # inactivity. A daily HTTP request keeps the app awake.
  # ─────────────────────────────────────────────────────────
  keep_alive:
    name: Keep Streamlit App Awake
    runs-on: ubuntu-latest
    needs: fetch_and_commit   # Run after data is committed

    steps:
      - name: Ping Streamlit app
        run: |
          echo "Pinging https://adelaide-weather-auditor.streamlit.app/ ..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            https://adelaide-weather-auditor.streamlit.app/ || echo "CURL_FAILED")
          echo "HTTP status: $STATUS"
          # Don't fail the workflow if the ping fails — it's best-effort
